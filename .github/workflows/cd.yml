name: deploy-backend

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:          ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID:      ${{ vars.AWS_ACCOUNT_ID }}
  ECR_API_REPOSITORY:  ${{ vars.ECR_API_REPOSITORY }}
  EC2_INSTANCE_ID:     ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push da imagem do backend
        env:
          REGISTRY:  ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_API_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_API_REPOSITORY:latest \
            .
          docker push $REGISTRY/$ECR_API_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_API_REPOSITORY:latest

      - name: Deploy via SSM
        env:
          REGISTRY:  ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend $IMAGE_TAG" \
            --parameters 'commands=[
              "set -euo pipefail",
              "grep -v ^ECR_API_IMAGE= /opt/app/.env > /opt/app/.env.tmp || true",
              "echo ECR_API_IMAGE=${{ env.REGISTRY }}/${{ env.ECR_API_REPOSITORY }}:${{ env.IMAGE_TAG }} >> /opt/app/.env.tmp",
              "mv /opt/app/.env.tmp /opt/app/.env",
              "chmod 600 /opt/app/.env",
              "set -a; source /opt/app/.env; set +a",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com",
              "cd /opt/app && docker compose pull api",
              "cd /opt/app && docker compose up -d api"
            ]' \
            --region "$AWS_REGION" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Aguarda até 3 minutos pelo resultado
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "Status" \
            --output text)

          echo "Status do comando: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
