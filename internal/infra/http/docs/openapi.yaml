openapi: 3.0.3
info:
  title: Gym API
  version: 1.0.0

tags:
  - name: Auth
  - name: Exercises
  - name: Tasks
  - name: UserMetrics
  - name: Workouts
  - name: WorkoutSessions

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Create account
      description: |
        Creates a new user account and sends a 6-digit verification code to the
        provided email. The account is inactive until verified via
        `POST /auth/register/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created; verification code sent to email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/register/verify:
    post:
      tags: [Auth]
      summary: Verify email and complete registration
      description: |
        Validates the 6-digit code sent during registration. On success the
        account is activated and a session token is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified; session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/register/resend:
    post:
      tags: [Auth]
      summary: Resend registration verification code
      description: |
        Sends a new 6-digit code to the given email if the account exists and is
        not yet verified. Always returns 200 to avoid leaking whether the email
        is registered. Limited to **3 emails per hour** per address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendCodeRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      tags: [Auth]
      summary: Request login code
      description: |
        Validates email and password. On success a 6-digit verification code is
        sent to the user's email. Submit the code to `POST /auth/login/verify`
        to receive a session token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Credentials valid; verification code sent to email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/login/verify:
    post:
      tags: [Auth]
      summary: Verify login code and get token
      description: |
        Validates the 6-digit code sent during the login step. On success a
        session token is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Code verified; session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/login/resend:
    post:
      tags: [Auth]
      summary: Resend login verification code
      description: |
        Sends a new 6-digit code to the given email if the account exists and is
        verified. Always returns 200 to avoid leaking whether the email is
        registered. Limited to **3 emails per hour** per address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendCodeRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Deletes the current session token.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session deleted
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      description: Returns all active (non-expired, non-revoked) sessions for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke session
      description: Deletes a specific session belonging to the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Exercises ────────────────────────────────────────────────────────────────

  /exercises:
    get:
      tags: [Exercises]
      summary: List exercises
      description: |
        Returns a cursor-paginated list of exercises. Use `?search=` to filter by
        name (case-insensitive). Pass the `cursor.next_cursor` value from the
        previous response as `?cursor=` to fetch the next page.
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Filter by name (partial, case-insensitive)
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor from a previous response to fetch the next page
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of exercises
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExercisePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Exercises]
      summary: Create exercise
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExerciseRequest'
      responses:
        '201':
          description: Exercise created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /exercises/{id}:
    get:
      tags: [Exercises]
      summary: Get exercise
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Exercise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Tasks ───────────────────────────────────────────────────────────────────

  /tasks:
    post:
      tags: [Tasks]
      summary: Create task
      description: |
        Creates a task schedule. Recurring tasks are completed per occurrence
        date, so completing a daily, weekly, monthly, or custom task does not
        complete the entire series.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/uncompleted:
    get:
      tags: [Tasks]
      summary: List uncompleted tasks for a day
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date to inspect (YYYY-MM-DD)
      responses:
        '200':
          description: Scheduled task occurrences that are not completed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskOccurrence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/month:
    get:
      tags: [Tasks]
      summary: List tasks for a month
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 4
      responses:
        '200':
          description: Scheduled task occurrences in the month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskOccurrence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/day:
    get:
      tags: [Tasks]
      summary: List tasks for a specific day
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date to inspect (YYYY-MM-DD)
      responses:
        '200':
          description: Scheduled task occurrences for the day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskOccurrence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/{id}/complete:
    patch:
      tags: [Tasks]
      summary: Complete a task occurrence
      description: Completes the task for the provided date, or today when omitted.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteTaskRequest'
      responses:
        '200':
          description: Completed task occurrence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskOccurrence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /user-metrics/today:
    get:
      tags: [UserMetrics]
      summary: Get today's missions and progress
      description: |
        Returns today's scheduled workout missions and task missions for the
        authenticated user, along with progress counters per section and overall.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Today's missions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayMissionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Workouts ─────────────────────────────────────────────────────────────────

  /workouts:
    get:
      tags: [Workouts]
      summary: List user workouts
      description: Returns all workouts belonging to the authenticated user, each including its exercises.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of workouts with exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Workouts]
      summary: Create workout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        '201':
          description: Workout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workouts/{id}:
    get:
      tags: [Workouts]
      summary: Get workout with exercises
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workout with exercises
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Workouts]
      summary: Update workout
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkoutRequest'
      responses:
        '200':
          description: Updated workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Workouts]
      summary: Delete workout
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Workout deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workouts/{id}/exercises:
    post:
      tags: [Workouts]
      summary: Add exercise to workout
      description: Adds an exercise to the workout. A workout can have at most 50 exercises.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkoutExerciseRequest'
      responses:
        '201':
          description: Exercise added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutExercise'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workouts/{id}/exercises/reorder:
    patch:
      tags: [Workouts]
      summary: Reorder workout exercises
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderWorkoutExercisesRequest'
      responses:
        '204':
          description: Exercises reordered
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workouts/{id}/exercises/{weId}:
    put:
      tags: [Workouts]
      summary: Update workout exercise
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: weId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkoutExerciseRequest'
      responses:
        '200':
          description: Updated workout exercise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutExercise'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Workouts]
      summary: Remove exercise from workout
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: weId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Exercise removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workouts/{id}/progress:
    get:
      tags: [Workouts]
      summary: Get exercise evolution for a workout
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: exercise_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter progress to a single exercise
      responses:
        '200':
          description: Progress per exercise
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExerciseProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Workout Sessions ──────────────────────────────────────────────────────────

  /workout-sessions/missed:
    get:
      tags: [WorkoutSessions]
      summary: List missed workout sessions
      description: |
        Returns days where a workout was scheduled but no session (complete or
        incomplete) was recorded. Bonus sessions (unscheduled days) are excluded.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD). Defaults to 30 days ago.
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD). Defaults to today.
      responses:
        '200':
          description: List of missed sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MissedSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workout-sessions:
    get:
      tags: [WorkoutSessions]
      summary: List workout sessions
      security:
        - bearerAuth: []
      parameters:
        - name: workout_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: YYYY-MM-DD
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: YYYY-MM-DD
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [WorkoutSessions]
      summary: Create workout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workout-sessions/{id}:
    get:
      tags: [WorkoutSessions]
      summary: Get session with recorded sets
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSessionDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [WorkoutSessions]
      summary: Update session status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkoutSessionRequest'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workout-sessions/{id}/sets:
    post:
      tags: [WorkoutSessions]
      summary: Record a set
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordSetRequest'
      responses:
        '201':
          description: Set recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseSet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workout-sessions/{id}/sets/{setId}:
    put:
      tags: [WorkoutSessions]
      summary: Update a set
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: setId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSetRequest'
      responses:
        '200':
          description: Updated set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseSet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [WorkoutSessions]
      summary: Delete a set
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: setId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Set deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: secret123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: secret123

    ResendCodeRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    VerifyEmailRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        code:
          type: string
          pattern: '^\d{6}$'
          example: '482910'

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: verification code sent to your email

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: a3f1c2...
        expires_at:
          type: string
          format: date-time
          nullable: true

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    SessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_agent:
          type: string
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true

    Error:
      type: object
      properties:
        error:
          type: string

    # ── Pagination ────────────────────────────────────────────────────────────

    CursorMeta:
      type: object
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Opaque token to pass as `?cursor=` to retrieve the next page. Null when there are no more pages.
        has_more:
          type: boolean

    ExercisePage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Exercise'
        cursor:
          $ref: '#/components/schemas/CursorMeta'

    # ── Exercise schemas ──────────────────────────────────────────────────────

    Exercise:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Bench Press
        type:
          type: string
          enum: [repetition, time]
        unit:
          type: string
          example: kg
        created_at:
          type: string
          format: date-time

    CreateExerciseRequest:
      type: object
      required: [name, type, unit]
      properties:
        name:
          type: string
          example: Bench Press
        type:
          type: string
          enum: [repetition, time]
        unit:
          type: string
          example: kg

    # ── Task schemas ──────────────────────────────────────────────────────────

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        level:
          type: string
          enum: [hard, medium, easy, no_rank]
        title:
          type: string
          example: Drink water
        description:
          type: string
          nullable: true
        initial_date:
          type: string
          format: date
        final_date:
          type: string
          format: date
        recurrence_type:
          type: string
          enum: [one_time, weekly, daily, monthly, custom]
        custom_days_of_week:
          type: array
          items:
            type: string
            enum: [sunday, monday, tuesday, wednesday, thursday, friday, saturday]
        is_optional:
          type: boolean
        is_completed:
          type: boolean
          description: Completion status for the occurrence being returned.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskOccurrence:
      allOf:
        - $ref: '#/components/schemas/Task'
        - type: object
          properties:
            occurrence_date:
              type: string
              format: date

    CreateTaskRequest:
      type: object
      required: [level, title, initial_date, final_date, recurrence_type]
      properties:
        level:
          type: string
          enum: [hard, medium, easy, no_rank]
        title:
          type: string
          minLength: 1
          maxLength: 150
        description:
          type: string
          maxLength: 1000
          nullable: true
        initial_date:
          type: string
          format: date-time
          description: Date portion is used.
        final_date:
          type: string
          format: date-time
          description: Date portion is used and must be on or after initial_date.
        recurrence_type:
          type: string
          enum: [one_time, weekly, daily, monthly, custom]
        custom_days_of_week:
          type: array
          description: Required when recurrence_type is custom; ignored otherwise.
          items:
            type: string
            enum: [sunday, monday, tuesday, wednesday, thursday, friday, saturday]
        is_optional:
          type: boolean

    CompleteTaskRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: Occurrence date to complete. Defaults to today when omitted.

    Progress:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer

    WorkoutMission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        is_completed:
          type: boolean

    TaskMission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        level:
          type: string
          enum: [hard, medium, easy, no_rank]
        title:
          type: string
        description:
          type: string
          nullable: true
        occurrence_date:
          type: string
          format: date
        is_optional:
          type: boolean
        is_completed:
          type: boolean

    WorkoutMissions:
      type: object
      properties:
        progress:
          $ref: '#/components/schemas/Progress'
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutMission'

    TaskMissions:
      type: object
      properties:
        progress:
          $ref: '#/components/schemas/Progress'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskMission'

    TodayMissionsResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        progress:
          $ref: '#/components/schemas/Progress'
        workouts:
          $ref: '#/components/schemas/WorkoutMissions'
        tasks:
          $ref: '#/components/schemas/TaskMissions'

    # ── Workout schemas ───────────────────────────────────────────────────────

    Workout:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
          example: Workout A
        description:
          type: string
          nullable: true
        days_of_week:
          type: array
          items:
            type: string
            enum: [monday, tuesday, wednesday, thursday, friday]
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkoutDetail:
      allOf:
        - $ref: '#/components/schemas/Workout'
        - type: object
          properties:
            exercises:
              type: array
              items:
                $ref: '#/components/schemas/WorkoutExercise'
            done_today:
              type: boolean
              description: Whether the workout already has a complete session recorded for the current day.

    CreateWorkoutRequest:
      type: object
      required: [name, days_of_week]
      properties:
        name:
          type: string
          example: Workout A
        description:
          type: string
          nullable: true
        days_of_week:
          type: array
          minItems: 1
          items:
            type: string
            enum: [monday, tuesday, wednesday, thursday, friday]

    UpdateWorkoutRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        days_of_week:
          type: array
          minItems: 1
          items:
            type: string
            enum: [monday, tuesday, wednesday, thursday, friday]
        active:
          type: boolean

    WorkoutExercise:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workout_id:
          type: string
          format: uuid
        exercise_id:
          type: string
          format: uuid
        exercise:
          $ref: '#/components/schemas/Exercise'
        sets:
          type: integer
          example: 4
        reps_min:
          type: integer
          nullable: true
          example: 8
        reps_max:
          type: integer
          nullable: true
          example: 12
        duration:
          type: integer
          nullable: true
          description: Duration in seconds
        note:
          type: string
          nullable: true
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time

    AddWorkoutExerciseRequest:
      type: object
      required: [exercise_id, sets]
      properties:
        exercise_id:
          type: string
          format: uuid
        sets:
          type: integer
          minimum: 1
        reps_min:
          type: integer
          minimum: 1
          nullable: true
        reps_max:
          type: integer
          minimum: 1
          nullable: true
        duration:
          type: integer
          minimum: 1
          nullable: true
          description: Duration in seconds
        note:
          type: string
          nullable: true
        sort_order:
          type: integer
          minimum: 0
          default: 0

    UpdateWorkoutExerciseRequest:
      type: object
      properties:
        sets:
          type: integer
          minimum: 1
        reps_min:
          type: integer
          minimum: 1
          nullable: true
        reps_max:
          type: integer
          minimum: 1
          nullable: true
        duration:
          type: integer
          minimum: 1
          nullable: true
        note:
          type: string
          nullable: true
        sort_order:
          type: integer
          minimum: 0

    ReorderWorkoutExercisesRequest:
      type: object
      required: [exercises]
      properties:
        exercises:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/ReorderWorkoutExerciseItem'

    ReorderWorkoutExerciseItem:
      type: object
      required: [id, sort_order]
      properties:
        id:
          type: string
          format: uuid
        sort_order:
          type: integer
          minimum: 0

    # ── Session schemas ───────────────────────────────────────────────────────

    WorkoutSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workout_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        status:
          type: string
          enum: [complete, incomplete, skipped]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkoutSessionDetail:
      allOf:
        - $ref: '#/components/schemas/WorkoutSession'
        - type: object
          properties:
            sets:
              type: array
              items:
                $ref: '#/components/schemas/ExerciseSet'

    CreateWorkoutSessionRequest:
      type: object
      required: [workout_id, date, status]
      properties:
        workout_id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        status:
          type: string
          enum: [complete, incomplete, skipped]

    UpdateWorkoutSessionRequest:
      type: object
      properties:
        status:
          type: string
          enum: [complete, incomplete, skipped]

    ExerciseSet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        exercise_id:
          type: string
          format: uuid
        set_number:
          type: integer
        reps:
          type: integer
          nullable: true
        weight:
          type: number
          format: float
          nullable: true
        duration:
          type: integer
          nullable: true
          description: Duration in seconds
        created_at:
          type: string
          format: date-time

    RecordSetRequest:
      type: object
      required: [exercise_id, set_number]
      properties:
        exercise_id:
          type: string
          format: uuid
        set_number:
          type: integer
          minimum: 1
        reps:
          type: integer
          minimum: 0
          nullable: true
        weight:
          type: number
          format: float
          minimum: 0
          nullable: true
        duration:
          type: integer
          minimum: 0
          nullable: true

    UpdateSetRequest:
      type: object
      properties:
        reps:
          type: integer
          minimum: 0
          nullable: true
        weight:
          type: number
          format: float
          minimum: 0
          nullable: true
        duration:
          type: integer
          minimum: 0
          nullable: true

    MissedSession:
      type: object
      properties:
        date:
          type: string
          format: date
        workout_id:
          type: string
          format: uuid
        workout_name:
          type: string

    ExerciseProgress:
      type: object
      properties:
        exercise_id:
          type: string
          format: uuid
        exercise_name:
          type: string
        exercise_type:
          type: string
          enum: [repetition, time]
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionStat'

    SessionStat:
      type: object
      properties:
        date:
          type: string
          format: date
        best_set:
          $ref: '#/components/schemas/ExerciseSet'

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Invalid or expired verification code
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — maximum 3 verification emails per hour
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
